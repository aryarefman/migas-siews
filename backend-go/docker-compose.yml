version: '3.8'

services:
  # SIEWS+ Go Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: siews-backend
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
      - ./models:/app/models
      - siews-data:/app
    environment:
      - PORT=8000
      - DATABASE_URL=sqlite:///app/siews.db
      - INFERENCE_URL=http://inference:8001
      - GIN_MODE=release
      - FONNTE_TOKEN=${FONNTE_TOKEN:-}
      - DEFAULT_RECIPIENTS=${DEFAULT_RECIPIENTS:-}
      - FACILITY_NAME=${FACILITY_NAME:-Offshore Platform A}
    depends_on:
      - inference
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Inference Service
  inference:
    build:
      context: ../inference-service
      dockerfile: Dockerfile
    container_name: siews-inference
    ports:
      - "8001:8001"
    volumes:
      - ../backend/models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # PostgreSQL Database (optional - can use SQLite instead)
  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: siews-postgres
  #   environment:
  #     - POSTGRES_DB=siews
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  siews-data:
  # postgres-data:

networks:
  default:
    name: siews-network
