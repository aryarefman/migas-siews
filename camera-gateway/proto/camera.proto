syntax = "proto3";

package camera;

option go_package = "camera-gateway/proto";

service CameraStream {
  // Bidirectional streaming for real-time camera communication
  rpc StreamFrames (stream FrameRequest) returns (stream FrameResponse);
  
  // Unary for configuration
  rpc ConfigureCamera (CameraConfig) returns (ConfigResponse);
  
  // Unary for camera status
  rpc GetStatus (StatusRequest) returns (StatusResponse);
}

message FrameRequest {
  bytes frame_data = 1;        // Raw frame bytes (JPEG/H.264)
  int64 timestamp = 2;         // Unix timestamp in microseconds
  string camera_id = 3;        // Camera identifier
  int32 frame_number = 4;      // Sequential frame number
  map<string, string> metadata = 5; // Optional metadata
}

message FrameResponse {
  bytes annotated_frame = 1;    // Frame with detection overlay
  repeated Detection detections = 2; // Detection results
  int64 processing_time_us = 3; // Processing time in microseconds
  string status = 4;            // "ok", "error", etc.
  string error_message = 5;     // Error details if any
}

message Detection {
  string class_name = 1;        // e.g., "person", "helmet", "fire"
  float confidence = 2;         // 0.0 to 1.0
  repeated int32 bbox = 3;      // [x1, y1, x2, y2]
  map<string, float> attributes = 4; // e.g., {"has_helmet": 1.0}
}

message CameraConfig {
  string camera_id = 1;
  int32 width = 2;
  int32 height = 3;
  int32 fps = 4;
  string codec = 5;             // "h264", "h265", "jpeg"
  map<string, string> settings = 6;
}

message ConfigResponse {
  bool success = 1;
  string message = 2;
}

message StatusRequest {
  string camera_id = 1;
}

message StatusResponse {
  bool connected = 1;
  int32 current_fps = 2;
  int64 frames_received = 3;
  int64 frames_processed = 4;
  double avg_latency_ms = 5;
}
