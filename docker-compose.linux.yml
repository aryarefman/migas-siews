# ============================================================
# SIEWS+ 5.0 — All-in-OContainer (Linux GPU)
# Runs backend + inference + frontend in ONE container
# Base: nvidia/cuda debian-slim (lightweight + GPU)
#
# Usage:
#   docker compose -f docker-compose.linux.yml up --build
#   docker compose -f docker-compose.linux.yml up -d
#
# Access:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:8001
#   Inference: http://localhost:8002
#
# Requirements:
#   - NVIDIA GPU + nvidia-container-toolkit
#   - /dev/video0 webcam (optional)


services:
  siews:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    ports:
      - "3000:3000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./model:/app/model:ro
      - ./backend:/app/backend
      - ./backend/static:/app/backend/static
      - siews-data:/app/data
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - MODEL_BASE=/app
      - DATABASE_URL=sqlite:////app/data/siews.db
      - CAMERA_SOURCE=0
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  siews-data:
