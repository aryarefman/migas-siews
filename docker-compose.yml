# ============================================================
# SIEWS+ 5.0 — Cross-Platform Docker Compose (CPU fallback)
# Works on Windows/Mac/Linux without GPU
#
# For GPU-accelerated Linux:
#   docker compose -f docker-compose.linux.yml up --build
#
# For CPU (any OS):
#   docker compose up --build
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./model:/app/model:ro
      - ./backend:/app/backend
      - ./backend/static:/app/backend/static
      - siews-data:/app/data
    devices:
      - /dev/video0:/dev/video0
    environment:
      - MODEL_BASE=/app
      - DATABASE_URL=sqlite:////app/data/siews.db
      - INFERENCE_URL=http://inference:8001
      - CAMERA_SOURCE=0
      - PYTHONUNBUFFERED=1
    depends_on:
      inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: inference-service/Dockerfile
    ports:
      - "8002:8001"
    volumes:
      - ./model:/app/model:ro
    environment:
      - MODEL_BASE=/app
      - GO_BACKEND_URL=http://backend:8001
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
      - BACKEND_INTERNAL_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  siews-data:
